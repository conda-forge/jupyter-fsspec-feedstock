{% set name = "jupyter-fsspec" %}
{% set version = "0.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jupyter_fsspec-{{ version }}.tar.gz
  sha256: 1943a8c921eac2445485dbe210b10c06a103bce33caa9158e3ae3d9f7ba6a4ef

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
    - pip
  run:
    - python >={{ python_min }}
    - fsspec
    - pydantic >=2
    - jupyter_server >=2.4.0,<3

test:
  imports:
    - jupyter_fsspec
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/fsspec/jupyter-fsspec
  summary: A Jupyter interface for fsspec.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - RRosio
